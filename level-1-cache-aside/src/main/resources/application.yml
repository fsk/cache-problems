server:
  port: 8101

spring:
  application:
    name: level-1-cache-aside
  datasource:
    url: jdbc:postgresql://localhost:5433/lab
    username: lab
    password: lab
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6380

level1:
  cache:
    key-prefix: "level1:product"
    ttl-seconds: 30
  db:
    simulated-latency-ms: 150

logging:
  level:
    com.lab.level1: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
