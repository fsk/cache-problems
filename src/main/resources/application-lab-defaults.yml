# Import in level application.yml: spring.config.import=classpath:application-lab-defaults.yml

lab:
  level-name: unset
  redis:
    host: localhost
    port: 6379
    database: 0
  postgres:
    url: jdbc:postgresql://localhost:5432/lab
    username: lab
    password: lab
  cache:
    key-prefix: lab
    default-ttl-seconds: 60

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        format_sql: false
  datasource:
    url: ${lab.postgres.url}
    username: ${lab.postgres.username}
    password: ${lab.postgres.password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
